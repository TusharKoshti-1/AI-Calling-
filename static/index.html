<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Real Estate Dialer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080808;--surface:#111;--surface2:#161616;--border:#1e1e1e;
  --accent:#ff3d00;--accent2:#ff8c00;--green:#00e676;--yellow:#ffd600;
  --muted:#333;--text:#e8e8e8;--sub:#555;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--text)}
.logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
.agency-name{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--sub);letter-spacing:1px}
.status-pill{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 10px;border-radius:2px;border:1px solid var(--muted);color:var(--sub);display:flex;align-items:center;gap:6px;white-space:nowrap}
.status-pill.ok{border-color:var(--green);color:var(--green)}
.status-pill.ok::before{content:'';width:5px;height:5px;background:var(--green);border-radius:50%;animation:blink 2s infinite}
.status-pill.err{border-color:var(--accent);color:var(--accent)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* LAYOUT */
.layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 52px)}

/* LEFT */
.left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.section-label{padding:14px 20px 10px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--sub);text-transform:uppercase;border-bottom:1px solid var(--border)}

/* DIAL */
.dial{padding:16px 20px;border-bottom:1px solid var(--border)}
.field-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--sub);text-transform:uppercase;margin-bottom:6px;display:block}
.input-row{display:flex;gap:8px}
.phone-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;font-family:'IBM Plex Mono',monospace;font-size:15px;letter-spacing:1px;outline:none;border-radius:2px;transition:border-color .2s}
.phone-input:focus{border-color:var(--accent)}
.phone-input::placeholder{color:var(--muted);font-size:12px;letter-spacing:0}
.btn-call{background:var(--accent);color:#fff;border:none;padding:0 18px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;border-radius:2px;transition:background .15s,transform .1s;white-space:nowrap}
.btn-call:hover{background:#e63600}
.btn-call:active{transform:scale(.97)}
.btn-call:disabled{background:var(--muted);cursor:not-allowed}

/* BULK */
.bulk-row{margin-top:10px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);cursor:pointer;user-select:none;transition:color .2s}
.bulk-row:hover{color:var(--accent)}
.bulk-box{display:none;margin-top:8px}
.bulk-box.open{display:block}
.bulk-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;resize:vertical;min-height:72px;outline:none;border-radius:2px;line-height:1.7}
.bulk-input:focus{border-color:var(--accent)}
.btn-bulk{margin-top:6px;width:100%;background:transparent;border:1px solid rgba(255,61,0,.4);color:var(--accent);padding:7px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;cursor:pointer;border-radius:2px;transition:background .15s}
.btn-bulk:hover{background:rgba(255,61,0,.08)}
.bulk-progress{display:none;margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--yellow)}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--surface2);padding:12px 16px}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}
.stat-num.g{color:var(--green)}.stat-num.y{color:var(--yellow)}.stat-num.r{color:var(--accent)}.stat-num.o{color:var(--accent2)}
.stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--sub);text-transform:uppercase;margin-top:2px}

/* CALL LIST */
.call-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.call-item{padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;display:grid;grid-template-columns:1fr auto;gap:4px;align-items:center}
.call-item:hover{background:rgba(255,255,255,.02)}
.call-item.active{background:rgba(255,61,0,.05);border-left:2px solid var(--accent);padding-left:18px}
.call-item.hot{border-left:2px solid var(--accent2);padding-left:18px}
.call-item.hot.active{border-left:2px solid var(--accent2)}
.call-phone{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text)}
.call-time{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--sub);margin-top:2px}
.badge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 7px;border-radius:2px;text-transform:uppercase;letter-spacing:.5px}
.b-ring{background:rgba(255,214,0,.1);color:var(--yellow);border:1px solid rgba(255,214,0,.25)}
.b-ans{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.b-done{background:rgba(255,255,255,.05);color:var(--sub);border:1px solid var(--border)}
.b-fail{background:rgba(255,61,0,.1);color:var(--accent);border:1px solid rgba(255,61,0,.25)}
.b-hot{background:rgba(255,140,0,.12);color:var(--accent2);border:1px solid rgba(255,140,0,.3)}
.empty-msg{padding:40px 20px;text-align:center;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:2}

/* RIGHT */
.right{display:flex;flex-direction:column;overflow:hidden}
.detail-header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.detail-phone{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;display:flex;align-items:center;gap:12px}
.hot-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;background:rgba(255,140,0,.15);color:var(--accent2);border:1px solid rgba(255,140,0,.4);padding:3px 10px;border-radius:2px;letter-spacing:1px}
.detail-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--sub);margin-top:4px;display:flex;gap:14px;flex-wrap:wrap}
.detail-body{flex:1;overflow-y:auto;padding:20px 28px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.section-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--sub);text-transform:uppercase;margin-bottom:14px}
.msg{display:flex;gap:10px;margin-bottom:12px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.avatar{width:26px;height:26px;border-radius:2px;font-family:'Bebas Neue',sans-serif;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.avatar.c{background:rgba(255,255,255,.07);color:var(--text)}
.avatar.a{background:rgba(255,61,0,.18);color:var(--accent)}
.msg-body{flex:1}
.msg-who{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--sub);margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase}
.msg-text{background:var(--surface2);border:1px solid var(--border);padding:9px 12px;border-radius:2px;line-height:1.65;font-size:13px}
.msg.ai .msg-text{border-color:rgba(255,61,0,.15)}
.rec-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.rec-link{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid rgba(255,61,0,.3);border-radius:2px;transition:background .15s}
.rec-link:hover{background:rgba(255,61,0,.08)}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted)}
.detail-empty svg{opacity:.2}
.detail-empty p{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px}
.no-transcript{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:16px 0}
#toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);padding:10px 18px;font-family:'IBM Plex Mono',monospace;font-size:11px;border-radius:2px;transform:translateY(60px);opacity:0;transition:all .3s;z-index:9998;max-width:300px}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--accent);color:var(--accent)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>

<header>
  <div class="logo">AI <span>DIALER</span></div>
  <div class="header-right">
    <div class="agency-name" id="agencyLabel">—</div>
    <div class="status-pill" id="statusPill">CHECKING</div>
  </div>
</header>

<div class="layout">
  <!-- LEFT -->
  <div class="left">
    <div class="section-label">Outbound Calls</div>

    <div class="dial">
      <label class="field-label">Phone Number (with country code)</label>
      <div class="input-row">
        <input id="phoneInput" class="phone-input" type="tel" placeholder="+971XXXXXXXXX" autocomplete="off"/>
        <button class="btn-call" id="callBtn" onclick="makeCall()">CALL</button>
      </div>
      <div class="bulk-row" onclick="toggleBulk()">
        <span id="bulkArrow">▶</span> Bulk dial — paste multiple numbers
      </div>
      <div class="bulk-box" id="bulkBox">
        <textarea class="bulk-input" id="bulkInput" placeholder="+971501234567&#10;+971509876543&#10;+919876543210"></textarea>
        <button class="btn-bulk" onclick="bulkCall()">START BULK CALLING</button>
        <div class="bulk-progress" id="bulkProgress"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-lbl">Total Calls</div></div>
      <div class="stat"><div class="stat-num g" id="sAnswered">0</div><div class="stat-lbl">Answered</div></div>
      <div class="stat"><div class="stat-num o" id="sHot">0</div><div class="stat-lbl">🔥 Hot Leads</div></div>
      <div class="stat"><div class="stat-num r" id="sFailed">0</div><div class="stat-lbl">No Answer</div></div>
    </div>

    <div class="call-list" id="callList">
      <div class="empty-msg" id="emptyMsg">NO CALLS YET<br/>ENTER A NUMBER ABOVE</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right" id="rightPanel">
    <div class="detail-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
      </svg>
      <p>SELECT A CALL TO VIEW TRANSCRIPT</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let calls = [], selectedSid = null, agentName = 'Sara';

async function init() {
  await loadStatus();
  await loadCalls();
  setInterval(loadCalls, 3000);
}

async function loadStatus() {
  try {
    const d = await fetch('/api/status').then(r => r.json());
    agentName = d.agent || 'Sara';
    document.getElementById('agencyLabel').textContent = d.agency || '';
    const pill = document.getElementById('statusPill');
    if (d.twilio_configured) {
      pill.textContent = '● LIVE  ' + (d.from_number || '');
      pill.classList.add('ok');
    } else {
      pill.textContent = '✗ TWILIO_AUTH_TOKEN MISSING';
      pill.classList.add('err');
    }
    document.title = (d.agency || 'AI') + ' — Dialer';
  } catch(e) {
    document.getElementById('statusPill').textContent = 'SERVER ERROR';
  }
}

async function loadCalls() {
  try {
    const d = await fetch('/api/calls').then(r => r.json());
    calls = d.calls || [];
    renderList();
    updateStats();
    if (selectedSid) renderDetail(selectedSid);
  } catch(e) {}
}

// ── MAKE CALL ────────────────────────────────────────────────────────────────
async function makeCall(phone) {
  const input = document.getElementById('phoneInput');
  const num   = (phone || input.value).trim();
  if (!num) { toast('Enter a phone number', 'err'); return; }

  const btn = document.getElementById('callBtn');
  btn.disabled = true; btn.textContent = '...';

  try {
    const d = await fetch('/api/call', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone: num})
    }).then(r => r.json());

    if (d.success) {
      toast('✓ Calling ' + num, 'ok');
      input.value = '';
      await loadCalls();
      if (d.sid) selectCall(d.sid);
    } else {
      toast('✗ ' + (d.error || 'Failed'), 'err');
    }
  } catch(e) { toast('✗ Network error', 'err'); }

  btn.disabled = false; btn.textContent = 'CALL';
}

// ── BULK CALL ─────────────────────────────────────────────────────────────────
function toggleBulk() {
  const box = document.getElementById('bulkBox');
  const arr = document.getElementById('bulkArrow');
  box.classList.toggle('open');
  arr.textContent = box.classList.contains('open') ? '▼' : '▶';
}

async function bulkCall() {
  const raw  = document.getElementById('bulkInput').value;
  const nums = raw.split('\n').map(n => n.trim()).filter(n => n.length > 6);
  if (!nums.length) { toast('No valid numbers', 'err'); return; }

  const prog = document.getElementById('bulkProgress');
  prog.style.display = 'block';

  for (let i = 0; i < nums.length; i++) {
    prog.textContent = `Calling ${i+1} / ${nums.length}: ${nums[i]}`;
    await makeCall(nums[i]);
    if (i < nums.length - 1) await sleep(2500);
  }
  prog.textContent = `✓ Done — ${nums.length} calls placed`;
  toast(`✓ ${nums.length} calls placed`, 'ok');
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList() {
  const list  = document.getElementById('callList');
  const empty = document.getElementById('emptyMsg');
  empty.style.display = calls.length ? 'none' : 'block';

  const existing = {};
  list.querySelectorAll('.call-item').forEach(el => existing[el.dataset.sid] = el);

  calls.forEach(c => {
    let el = existing[c.sid];
    if (!el) {
      el = document.createElement('div');
      el.className = 'call-item';
      el.dataset.sid = c.sid;
      el.onclick = () => selectCall(c.sid);
      list.appendChild(el);
    }
    el.className = 'call-item' + (selectedSid===c.sid?' active':'') + (c.hot_lead?' hot':'');
    const bc = badgeClass(c.status);
    const hotBadge = c.hot_lead ? `<span class="badge b-hot" style="margin-left:4px">🔥 HOT</span>` : '';
    el.innerHTML = `
      <div>
        <div class="call-phone">${esc(c.phone||c.sid)}</div>
        <div class="call-time">${c.started_at||''} · ${c.duration||'—'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <span class="badge ${bc}">${c.status}</span>
        ${hotBadge}
      </div>`;
  });

  Object.keys(existing).forEach(sid => {
    if (!calls.find(c=>c.sid===sid)) existing[sid].remove();
  });
}

function badgeClass(s) {
  return {ringing:'b-ring',answered:'b-ans',completed:'b-done','no-answer':'b-fail',busy:'b-fail',failed:'b-fail'}[s]||'b-done';
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('sTotal').textContent    = calls.length;
  document.getElementById('sAnswered').textContent = calls.filter(c=>['answered','completed'].includes(c.status)).length;
  document.getElementById('sHot').textContent      = calls.filter(c=>c.hot_lead).length;
  document.getElementById('sFailed').textContent   = calls.filter(c=>['no-answer','busy','failed'].includes(c.status)).length;
}

// ── DETAIL VIEW ───────────────────────────────────────────────────────────────
function selectCall(sid) {
  selectedSid = sid;
  renderList();
  renderDetail(sid);
}

function renderDetail(sid) {
  const call = calls.find(c=>c.sid===sid);
  if (!call) return;
  const panel = document.getElementById('rightPanel');
  const bc    = badgeClass(call.status);

  let tHTML = '';
  (call.transcript||[]).forEach(line => {
    const isAI   = line.includes('(AI):');
    const prefix = isAI ? agentName + ' (AI):' : 'Customer:';
    const text   = line.replace(new RegExp('^' + esc(prefix).replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\s*'), '').trim()
                   || line.split(':').slice(1).join(':').trim();
    if (isAI) {
      tHTML += `<div class="msg ai">
        <div class="avatar a">AI</div>
        <div class="msg-body"><div class="msg-who">${esc(agentName)}</div>
        <div class="msg-text">${esc(text)}</div></div></div>`;
    } else if (line.startsWith('Customer:')) {
      tHTML += `<div class="msg">
        <div class="avatar c">C</div>
        <div class="msg-body"><div class="msg-who">Customer</div>
        <div class="msg-text">${esc(text)}</div></div></div>`;
    }
  });
  if (!tHTML) tHTML = `<div class="no-transcript">Waiting for conversation...</div>`;

  const recHTML = call.recording
    ? `<div class="rec-section"><div class="section-title">Recording</div>
       <a class="rec-link" href="${call.recording}" target="_blank">▶ Play Recording</a></div>`
    : '';

  const hotTag = call.hot_lead
    ? `<span class="hot-tag">🔥 HOT LEAD</span>` : '';

  panel.innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-phone">${esc(call.phone||call.sid)} ${hotTag}</div>
        <div class="detail-meta">
          <span>📅 ${call.started_at||'—'}</span>
          <span>⏱ ${call.duration||'—'}</span>
          <span><span class="badge ${bc}">${call.status}</span></span>
        </div>
      </div>
    </div>
    <div class="detail-body">
      <div class="section-title">Conversation Transcript</div>
      ${tHTML}
      ${recHTML}
    </div>`;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('phoneInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') makeCall();
  });
  init();
});

let _tt;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(_tt); _tt = setTimeout(() => el.className='', 3500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
