<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dialer — CallSara</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar">
    <div class="brand"><div class="brand-logo"><span class="brand-icon">◈</span><span class="brand-name">CallSara</span></div><div class="brand-agency" id="sidebarAgency"></div></div>
    <nav class="nav-links">
      <div class="nav-section-label">OVERVIEW</div>
      <a class="nav-link" href="/">                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a class="nav-link" href="/calls">           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.02 5.13 2 2 0 012 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>All Calls</a>
      <a class="nav-link" href="/hot-leads">       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Hot Leads</a>
      <div class="nav-section-label">ACTIONS</div>
      <a class="nav-link active" href="/dialer">   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>New Call</a>
      <div class="nav-section-label">CONFIG</div>
      <a class="nav-link" href="/settings">        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>Settings</a>
    </nav>
    <div class="sidebar-status"><div class="status-row"><span class="status-dot" id="sidebarDot"></span><span class="status-text" id="sidebarStatus">Checking...</span></div><div class="status-version" id="sidebarVersion"></div></div>
  </nav>

  <div class="page-wrap">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="page-title">New Call</h1>
      </div>
      <div class="topbar-right"><div class="topbar-agency" id="topbarAgency"></div></div>
    </header>

    <main class="page-content">
      <div style="max-width:560px">

        <!-- SINGLE CALL -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.02 5.13 2 2 0 012 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
              Single Call
            </div>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <div class="form-hint">Include country code, e.g. +971501234567 for UAE</div>
              <div class="phone-input-row">
                <input id="singlePhone" class="phone-input" type="tel" placeholder="+971 50 123 4567" autocomplete="off"/>
                <button class="btn btn-gold btn-lg" id="singleBtn" onclick="singleCall()">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.02 5.13 2 2 0 012 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                  Call Now
                </button>
              </div>
            </div>
            <div style="font-size:12px;color:var(--t3)">
              Calling from: <span id="dialerFrom" style="color:var(--t2);font-family:'DM Mono',monospace">—</span>
            </div>
          </div>
        </div>

        <!-- BULK DIAL -->
        <div class="card" style="margin-bottom:0">
          <div class="card-header">
            <div class="card-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
              Bulk Dial
            </div>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Phone Numbers</label>
              <div class="form-hint">One number per line, with country code</div>
              <textarea class="form-textarea" id="bulkNumbers" rows="7"
                placeholder="+971501234567&#10;+971509876543&#10;+919876543210&#10;+447911123456"></textarea>
            </div>
            <div style="display:flex;gap:10px;align-items:center">
              <button class="btn btn-gold btn-full" id="bulkBtn" onclick="bulkDial()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Start Bulk Calling
              </button>
              <button class="btn btn-ghost" onclick="clearBulk()">Clear</button>
            </div>
            <div id="bulkProgress" style="display:none;margin-top:12px;font-size:12px;color:var(--amber);font-family:'DM Mono',monospace;padding:10px 14px;background:var(--amberd);border-radius:8px;line-height:1.8"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="toast"></div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script>
async function init() {
  await loadSidebarStatus();
  const s = await StatusAPI.get().catch(()=>({}));
  setText('dialerFrom', s.from_number || '—');
  document.getElementById('singlePhone').addEventListener('keydown', e => {
    if (e.key === 'Enter') singleCall();
  });
}

async function singleCall() {
  const phone = document.getElementById('singlePhone').value.trim();
  if (!phone) { toast('Enter a phone number', 'err'); return; }
  const btn = document.getElementById('singleBtn');
  btn.disabled = true; btn.textContent = 'Calling...';
  try {
    const d = await CallsAPI.initiate(phone);
    if (d.success) {
      toast('✓ Call initiated → ' + phone, 'ok');
      document.getElementById('singlePhone').value = '';
    } else {
      toast('✗ ' + (d.error || 'Call failed'), 'err');
    }
  } catch(e) { toast('✗ ' + e.message, 'err'); }
  btn.disabled = false;
  btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.02 5.13 2 2 0 012 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg> Call Now';
}

async function bulkDial() {
  const raw  = document.getElementById('bulkNumbers').value;
  const nums = raw.split('\n').map(n=>n.trim()).filter(n=>n.length>6);
  if (!nums.length) { toast('No valid numbers found', 'err'); return; }

  const prog = document.getElementById('bulkProgress');
  const btn  = document.getElementById('bulkBtn');
  btn.disabled = true;
  prog.style.display = 'block';

  let ok = 0, fail = 0;
  for (let i = 0; i < nums.length; i++) {
    prog.innerHTML = `📞 Calling ${i+1} of ${nums.length}: <strong>${nums[i]}</strong><br>✓ ${ok} succeeded · ✗ ${fail} failed`;
    try {
      const d = await CallsAPI.initiate(nums[i]);
      if (d.success) ok++; else { fail++; toast('✗ ' + nums[i] + ': ' + (d.error||'failed'), 'err'); }
    } catch(e) { fail++; }
    if (i < nums.length-1) await new Promise(r=>setTimeout(r,2500));
  }

  prog.innerHTML = `✅ Done — ${ok} calls placed, ${fail} failed`;
  btn.disabled = false;
  toast(`✓ ${ok} of ${nums.length} calls initiated`, 'ok');
}

function clearBulk() {
  document.getElementById('bulkNumbers').value = '';
  document.getElementById('bulkProgress').style.display = 'none';
}

const sleep = ms => new Promise(r=>setTimeout(r,ms));
init();
</script>
</body>
</html>
