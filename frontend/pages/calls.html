<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>All Calls — CallSara</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
<div class="app-layout">
  <!-- SIDEBAR (same on every page) -->
  <nav class="sidebar">
    <div class="brand"><div class="brand-logo"><span class="brand-icon">◈</span><span class="brand-name">CallSara</span></div><div class="brand-agency" id="sidebarAgency"></div></div>
    <nav class="nav-links">
      <div class="nav-section-label">OVERVIEW</div>
      <a class="nav-link" href="/" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a class="nav-link active" href="/calls" data-page="calls"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.02 5.13 2 2 0 012 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>All Calls</a>
      <a class="nav-link" href="/hot-leads" data-page="hot-leads"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Hot Leads</a>
      <div class="nav-section-label">ACTIONS</div>
      <a class="nav-link" href="/dialer" data-page="dialer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>New Call</a>
      <div class="nav-section-label">CONFIG</div>
      <a class="nav-link" href="/settings" data-page="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>Settings</a>
    </nav>
    <div class="sidebar-status"><div class="status-row"><span class="status-dot" id="sidebarDot"></span><span class="status-text" id="sidebarStatus">Checking...</span></div><div class="status-version" id="sidebarVersion"></div></div>
  </nav>

  <div class="page-wrap">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <h1 class="page-title">All Calls</h1>
      </div>
      <div class="topbar-right">
        <div class="topbar-agency" id="topbarAgency"></div>
        <a href="/dialer" class="btn btn-gold btn-sm">New Call</a>
      </div>
    </header>

    <main class="page-content">
      <div class="card" style="margin-bottom:0">
        <div class="card-header">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.02 5.13 2 2 0 012 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            All Calls
          </div>
          <div style="font-size:12px;color:var(--t3)" id="callsCountLabel">—</div>
        </div>
        <div class="filter-bar">
          <input class="search-input" id="clSearch" placeholder="Search number..." oninput="onSearch()"/>
          <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
          <button class="filter-tab" onclick="setFilter('ringing',this)">Ringing</button>
          <button class="filter-tab" onclick="setFilter('answered',this)">Answered</button>
          <button class="filter-tab" onclick="setFilter('completed',this)">Completed</button>
          <button class="filter-tab" onclick="setFilter('no-answer',this)">No Answer</button>
          <button class="filter-tab" onclick="setFilter('busy',this)">Busy</button>
          <div class="flex-spacer"></div>
          <div class="hot-filter" id="hotFilterBtn" onclick="toggleHot()">🔥 Hot only</div>
        </div>
        <div class="data-table">
          <div class="table-header" style="grid-template-columns:150px 95px 120px 75px 75px 1fr 100px">
            <span>Phone</span><span>Status</span><span>Date & Time</span>
            <span>Duration</span><span>Lead</span><span>Transcript</span><span>Actions</span>
          </div>
          <div id="callsTable"></div>
        </div>
        <div class="pagination" id="callsPager" style="display:none">
          <span id="callsPagerInfo"></span>
          <div class="pagination-btns">
            <button class="page-btn" id="clPrev" onclick="changePage(-1)">← Prev</button>
            <button class="page-btn" id="clNext" onclick="changePage(1)">Next →</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="callModal" onclick="closeModalOverlay('callModal',event)">
  <div class="modal">
    <div class="modal-header"><div><div class="modal-title" id="modalPhone">—</div><div class="modal-meta" id="modalMeta"></div></div><button class="modal-close" onclick="closeModalOverlay('callModal')">×</button></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<div id="toast"></div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/assets/js/table.js"></script>
<script>
const cl = { filter:'all', hot:false, search:'', page:0, size:30, total:0 };
const clTable = new CallTable('callsTable', buildCallRow);

async function init() {
  await loadSidebarStatus();
  const s = await StatusAPI.get().catch(()=>({}));
  window._agentName = s.agent_name || 'Sara';
  await loadCalls();
  setInterval(loadCalls, 6000);
}

async function loadCalls() {
  try {
    const d = await CallsAPI.list({ limit:cl.size, offset:cl.page*cl.size, status:cl.filter, hot_only:cl.hot, search:cl.search });
    cl.total = d.total || 0;
    setText('callsCountLabel', cl.total + ' calls');
    clTable.render(d.calls || []);

    const pg = document.getElementById('callsPager');
    if (cl.total <= cl.size) { pg.style.display='none'; return; }
    pg.style.display = 'flex';
    const start = cl.page*cl.size+1, end = Math.min(start+cl.size-1, cl.total);
    setText('callsPagerInfo', `${start}–${end} of ${cl.total}`);
    document.getElementById('clPrev').disabled = cl.page===0;
    document.getElementById('clNext').disabled = end>=cl.total;
  } catch(e) { console.error(e); }
}

function setFilter(v, el) {
  cl.filter=v; cl.page=0;
  document.querySelectorAll('.filter-bar .filter-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  loadCalls();
}
function toggleHot() {
  cl.hot=!cl.hot; cl.page=0;
  document.getElementById('hotFilterBtn').classList.toggle('active', cl.hot);
  loadCalls();
}
let _st;
function onSearch() {
  clearTimeout(_st);
  _st = setTimeout(()=>{ cl.search=document.getElementById('clSearch').value; cl.page=0; loadCalls(); }, 320);
}
function changePage(dir) { cl.page+=dir; loadCalls(); }

init();
</script>
</body>
</html>
