<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>All Calls · CallSara</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <script>window.CALLSARA_PAGE = "calls";</script>
</head>
<body>

<div id="sidebar-slot"></div>

<div class="main">
  <div id="topbar-slot"></div>

  <div class="pages">
    <div class="page active">
      <div class="page-body">

        <div class="card" style="margin-bottom:0">
          <div class="card-hd">
            <div class="card-title">📞 All Calls</div>
            <div style="font-size:12px;color:var(--t3)" id="calls-count-label">Loading...</div>
          </div>
          <div class="filter-bar" id="calls-filters">
            <input class="search-box" id="calls-search" placeholder="Search..."/>
            <button class="ftab on" data-filter="all">All</button>
            <button class="ftab" data-filter="answered">Answered</button>
            <button class="ftab" data-filter="completed">Completed</button>
            <button class="ftab" data-filter="no-answer">No Answer</button>
            <button class="ftab" data-filter="busy">Busy</button>
            <div class="sp"></div>
            <div class="hot-tog" id="calls-hot-tog">🔥 Hot only</div>
          </div>
          <div class="tbl-head">
            <span>Phone</span><span>Status</span><span>Date & Time</span>
            <span>Duration</span><span>Lead</span><span>Transcript</span><span>Actions</span>
          </div>
          <div class="tbl-body" id="calls-tbl"></div>
          <div class="pager" id="calls-pager" style="display:none">
            <span id="calls-pg-info"></span>
            <div class="pager-btns">
              <button class="pbtn" id="calls-prev">← Prev</button>
              <button class="pbtn" id="calls-next">Next →</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div class="overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-hd">
      <div>
        <div class="modal-phone" id="m-phone">—</div>
        <div class="modal-meta" id="m-meta"></div>
      </div>
      <button class="close-x" id="modal-close">×</button>
    </div>
    <div class="modal-body" id="m-body">
      <div class="loading-t">Loading transcript...</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>
<script src="/static/js/pages/calls-table.js"></script>
<script src="/static/js/pages/modal.js"></script>
<script src="/static/js/pages/calls.js"></script>
</body>
</html>
